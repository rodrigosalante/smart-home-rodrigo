<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart Home • Rodrigo</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f0b429;
  --gold-glow: rgba(240,180,41,0.5);
  --blue: #29b6f6;
  --green: #26d98b;
  --red: #ff4d6d;
  --bg: #06080f;
  --panel: #0b0e1c;
  --border: #1a2540;
  --text: #c8d8f0;
  --text-dim: #4a5a78;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body { height:100%; background:var(--bg); font-family:'Exo 2',sans-serif; overflow:hidden; color:var(--text); }
#app { display:flex; flex-direction:column; height:100vh; }

/* HEADER */
.hdr {
  height:50px; flex-shrink:0;
  padding:0 12px;
  background:rgba(6,8,15,0.97);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.logo {
  font-family:'Orbitron',sans-serif;
  font-size:12px; font-weight:900; letter-spacing:3px; color:var(--blue);
}
.logo span { color:#fff; }
.hdr-mid { display:flex; align-items:center; gap:10px; }
.clock {
  font-family:'Orbitron',sans-serif;
  font-size:19px; font-weight:700; letter-spacing:2px;
}
.weather { display:flex; flex-direction:column; line-height:1.2; }
.wtemp { font-size:14px; font-weight:600; color:var(--blue); }
.wcond { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
.hdr-btns { display:flex; gap:5px; }
.hbtn {
  padding:5px 10px; border-radius:6px; cursor:pointer;
  font-family:'Exo 2',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.5px;
  background:var(--panel); border:1px solid var(--border); color:var(--text-dim);
  transition:all .2s; white-space:nowrap;
}
.hbtn.blue { border-color:var(--blue); color:var(--blue); }
.hbtn.green { border-color:var(--green); color:var(--green); }
.hbtn.edit-active { border-color:var(--gold); color:var(--gold); background:rgba(240,180,41,0.1); }

/* FLOOR PLAN */
#plan-wrap {
  flex:1; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  background:#08080f;
}
#plan-container {
  position:relative;
  /* will be sized by JS to fit screen maintaining 1024:651 ratio */
}
#plan-dark, #plan-light {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:fill;
  border-radius:4px;
  display:block;
}
#plan-dark  { z-index:1; opacity:1; }
#plan-light { z-index:2; opacity:0; transition:opacity .5s ease; }

/* Room overlay zones */
.zone {
  position:absolute;
  z-index:10;
  cursor:pointer;
  touch-action:none;
  /* transparent by default — only the clip/mask changes */
  background:transparent;
  border:0;
  transition:all .3s;
  border-radius:3px;
  overflow:hidden;
}

  background-size:var(--plan-w) var(--plan-h); /* set by JS */
  background-repeat:no-repeat;
  background-position:calc(-1 * var(--zone-left)) calc(-1 * var(--zone-top));
  opacity:0;
  transition:opacity .45s ease;
  border-radius:3px;
}
.zone.on .zone-light {
  opacity:1;
}
/* Subtle highlight ring when on */
.zone.on {
  box-shadow:0 0 0 2px rgba(240,180,41,0.6), 0 0 20px rgba(240,180,41,0.3);
  border-radius:4px;
}
/* Label */
.zone-label {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:2; pointer-events:none;
  gap:2px;
}
.zone-name {
  font-size:10px; font-weight:700; letter-spacing:0.8px;
  text-transform:uppercase; text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8);
  color:rgba(255,255,255,0.0);
  transition:color .3s;
  line-height:1.2;
  padding:0 4px;
}
.zone.on .zone-name { color:rgba(255,220,100,0.9); }
body.labels-on .zone-name { color:rgba(200,220,255,0.7); }
body.labels-on .zone.on .zone-name { color:rgba(255,220,100,0.95); }

/* Edit mode: show zone borders */
body.editing .zone {
  border:2px dashed rgba(41,182,246,0.6);
  background:rgba(41,182,246,0.05);
}
body.editing .zone-name { color:rgba(180,210,255,0.8) !important; }

/* EDIT TOOLBAR */
.edit-bar {
  display:none; padding:7px 10px;
  background:rgba(6,8,15,0.98); border-top:1px solid var(--border);
  gap:6px; flex-wrap:wrap; flex-shrink:0;
}
body.editing .edit-bar { display:flex; }
.ebtn {
  padding:6px 12px; border-radius:6px; cursor:pointer;
  font-family:'Exo 2',sans-serif; font-size:9.5px; font-weight:600;
  background:var(--panel); border:1px solid var(--border); color:var(--text-dim);
  transition:all .2s;
}
.ebtn.save { border-color:var(--green); color:var(--green); }

/* BOTTOM BAR */
.bottom-bar {
  height:52px; flex-shrink:0;
  padding:0 10px;
  background:rgba(6,8,15,0.97);
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:7px;
}
.abtn {
  flex:1; height:36px; border-radius:7px; cursor:pointer;
  font-family:'Exo 2',sans-serif; font-size:10px; font-weight:800;
  letter-spacing:1px; text-transform:uppercase;
  border:1px solid; transition:all .2s;
}
.abtn:active { transform:scale(.97); }
.abtn-on  { background:rgba(240,180,41,0.12); border-color:var(--gold); color:var(--gold); }
.abtn-off { background:var(--panel); border-color:var(--border); color:var(--text-dim); }

/* MODALS */
.backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.82); z-index:300;
  align-items:center; justify-content:center;
}
.backdrop.open { display:flex; }
.modal {
  background:#0b0e1c; border:1px solid #2a3d65;
  border-radius:12px; padding:18px 16px;
  width:92%; max-width:360px; max-height:88vh; overflow-y:auto;
}
.modal h3 {
  font-family:'Orbitron',sans-serif; font-size:12px;
  letter-spacing:2px; color:var(--blue); margin-bottom:14px;
}
.modal label { display:block; font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
.modal input {
  width:100%; padding:8px 10px; margin-bottom:11px;
  background:#06080f; border:1px solid #2a3d65; border-radius:6px;
  color:var(--text); font-family:'Exo 2',sans-serif; font-size:12px; outline:none;
}
.modal input:focus { border-color:var(--blue); }
.mbtns { display:flex; gap:7px; margin-top:8px; }
.mbtn {
  flex:1; padding:10px; border-radius:7px; cursor:pointer;
  font-family:'Exo 2',sans-serif; font-size:10px; font-weight:700;
}
.mbtn.cancel { background:var(--panel); border:1px solid var(--border); color:var(--text-dim); }
.mbtn.ok { background:var(--blue); border:none; color:#000; }
.hr { border:none; border-top:1px solid var(--border); margin:12px 0; }
.device-row { display:flex; gap:5px; margin-bottom:5px; align-items:center; }
.device-row input { margin:0; flex:1; font-size:10px; }
.drem {
  width:26px; height:26px; flex-shrink:0;
  background:rgba(255,77,109,0.15); border:1px solid rgba(255,77,109,0.4);
  border-radius:5px; color:var(--red); font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.add-dev {
  width:100%; padding:6px;
  background:rgba(41,182,246,0.08); border:1px dashed rgba(41,182,246,0.35);
  border-radius:6px; color:var(--blue); font-size:9.5px; font-weight:600;
  letter-spacing:0.5px; cursor:pointer; margin-top:2px;
}
.stat-row { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
.sdot { width:7px; height:7px; border-radius:50%; background:var(--text-dim); }
.sdot.ok { background:var(--green); box-shadow:0 0 6px var(--green); }
.sdot.err { background:var(--red); }
.stext { font-size:10px; color:var(--text-dim); }
.test-btn {
  margin-left:auto; padding:4px 9px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:5px; color:var(--text-dim); font-size:9px; cursor:pointer;
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo">SMART<span>HOME</span></div>
    <div class="hdr-mid">
      <div class="clock" id="clock">--:--</div>
      <div class="weather">
        <div class="wtemp" id="wtemp">---</div>
        <div class="wcond" id="wcond">Imbituva/PR</div>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="hbtn blue" onclick="toggleFS()">⛶</button>
      <button class="hbtn" id="lblBtn" onclick="toggleLabels()">🏷 Nomes</button>
      <button class="hbtn green" onclick="openTuya()">⚙ TUYA</button>
      <button class="hbtn" id="editBtn" onclick="toggleEdit()">✏ EDITAR</button>
    </div>
  </div>

  <!-- FLOOR PLAN -->

      <button class="test-btn" onclick="testTuya()">Testar</button>
    </div>
    <div class="mbtns">
      <button class="mbtn cancel" onclick="closeTuya()">Cancelar</button>
      <button class="mbtn ok" onclick="saveTuya()">Salvar</button>
    </div>
  </div>
</div>

<!-- ZONE CONFIG MODAL -->
<div class="backdrop" id="zoneBackdrop">
  <div class="modal">
    <h3 id="zm-title">✏ CONFIGURAR ZONA</h3>
    <label>Nome do ambiente</label>
    <input id="zm-name" placeholder="Ex: Sala TV">
    <div class="hr"></div>
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:7px;">Device IDs Tuya</div>
    <div id="zm-devices"></div>
    <button class="add-dev" onclick="addDevRow()">＋ Adicionar Device ID</button>
    <div class="mbtns" style="margin-top:12px;">
      <button class="mbtn cancel" onclick="closeZoneModal()">Cancelar</button>
      <button class="mbtn ok" onclick="saveZoneModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════ INITIAL ZONE DATA ═══════════════
// Coordinates relative to the 1024×651 source image
// format: [name, left%, top%, width%, height%]
let zones = [
  {id:"garagem",   name:"Garagem",      lp:0.98,  tp:4.61,  wp:14.16, hp:86.02, on:false, tuya:[]},
  {id:"quarto1",   name:"Quarto",       lp:15.33, tp:3.84,  wp:20.51, hp:45.31, on:false, tuya:[]},
  {id:"is1",       name:"I.S.",         lp:36.13, tp:3.84,  wp:8.79,  hp:26.88, on:false, tuya:[]},
  {id:"quarto2",   name:"Quarto 2",     lp:45.12, tp:3.84,  wp:15.14, hp:45.31, on:false, tuya:[]},
  {id:"suite",     name:"Suíte",        lp:60.55, tp:3.84,  wp:19.04, hp:45.31, on:false, tuya:[]},
  {id:"is2",       name:"I.S. Suíte",   lp:79.88, tp:3.84,  wp:9.77,  hp:17.67, on:false, tuya:[]},
  {id:"closet",    name:"Closet",       lp:79.88, tp:21.51, wp:18.75, hp:27.65, on:false, tuya:[]},
  {id:"circ",      name:"Circulação",   lp:45.12, tp:30.72, wp:15.14, hp:26.88, on:false, tuya:[]},
  {id:"salatv",    name:"Sala TV",      lp:15.33, tp:55.30, wp:20.02, hp:39.17, on:false, tuya:[]},
  {id:"escritorio",name:"Escritório",   lp:15.33, tp:75.27, wp:16.60, hp:19.20, on:false, tuya:[]},
  {id:"despensa",  name:"Despensa",     lp:32.23, tp:75.27, wp:8.30,  hp:19.20, on:false, tuya:[]},
  {id:"copa",      name:"Copa/Cozinha", lp:40.53, tp:55.30, wp:57.62, hp:39.17, on:false, tuya:[]}
];

let tuyaCfg = {worker:"", clientId:"", secret:""};
let editing = false;
let labelsOn = false;
let _editingZone = null;

// ═══════════════ LAYOUT ═══════════════
const planWrap = document.getElementById('plan-wrap');
const planContainer = document.getElementById('plan-container');
const IMG_W = 1024, IMG_H = 651;

function resizePlan() {
  const maxW = planWrap.clientWidth;
  const maxH = planWrap.clientHeight;
  let scale = Math.min(maxW / IMG_W, maxH / IMG_H);
  const w = Math.floor(IMG_W * scale);
  const h = Math.floor(IMG_H * scale);
  planContainer.style.width  = w + 'px';
  planContainer.style.height = h + 'px';
  document.documentElement.style.setProperty('--plan-w', w + 'px');
  document.documentElement.style.setProperty('--plan-h', h + 'px');
  renderZones();
}

// ═══════════════ RENDER ZONES ═══════════════
function renderZones() {
  planContainer.querySelectorAll('.zone').forEach(e => e.remove());
  const W = planContainer.clientWidth;
  const H = planContainer.clientHeight;

  zones.forEach(z => {
    const el = document.createElement('div');
    el.className = 'zone' + (z.on ? ' on' : '');
    const left   = z.lp / 100 * W;
    const top    = z.tp / 100 * H;
    const width  = z.wp / 100 * W;
    const height = z.hp / 100 * H;
    el.style.left   = left + 'px';
    el.style.top    = top  + 'px';
    el.style.width  = width  + 'px';
    el.style.height = height + 'px';

    // Light image positioned so only this zone's region shows
    const zoneLight = document.createElement('div');
    zoneLight.className = 'zone-light';
    zoneLight.style.backgroundSize     = W + 'px ' + H + 'px';
    zoneLight.style.backgroundPosition = (-left) + 'px ' + (-top) + 'px';
    el.appendChild(zoneLight);

    // Label
    const label = document.createElement('div');
    label.className = 'zone-label';
    const nm = document.createElement('div');
    nm.className = 'zone-name';
    nm.textContent = z.name;
    label.appendChild(nm);
    el.appendChild(label);

    // Edit handles
    if (editing) {
      // Borda visual para indicar zona arrastável
      el.style.outline = '1px dashed rgba(240,180,41,0.6)';
      el.style.cursor = 'move';

      const rh = document.createElement('div');
      rh.dataset.handle = 'resize';
      rh.style.cssText = 'position:absolute;bottom:0;right:0;width:22px;height:22px;background:linear-gradient(135deg,transparent 45%,#ff4d6d 45%);cursor:se-resize;z-index:20;border-radius:0 0 4px 0;touch-action:none;';
      el.appendChild(rh);
      rh.addEventListener('pointerdown', e => { e.stopPropagation(); startResize(e, el, z, W, H); });

      const db = document.createElement('div');
      db.dataset.handle = 'delete';
      db.style.cssText = 'position:absolute;top:-10px;left:-10px;width:24px;height:24px;background:#ff4d6d;border:2px solid #06080f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;z-index:21;color:#fff;touch-action:none;';
      db.textContent = '✕';
      db.addEventListener('pointerdown', e => { e.stopPropagation(); e.preventDefault(); deleteZone(z.id); });
      el.appendChild(db);

      const eb = document.createElement('div');
      eb.dataset.handle = 'edit';
      eb.style.cssText = 'position:absolute;top:-10px;right:-10px;width:24px;height:24px;background:#29b6f6;border:2px solid #06080f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;z-index:21;color:#06080f;font-weight:900;touch-action:none;';
      eb.textContent = '⚙';
      eb.addEventListener('pointerdown', e => { e.stopPropagation(); e.preventDefault(); openZoneModal(z); });
      el.appendChild(eb);
    }

    // Events
    el.addEventListener('pointerdown', e => {
      // Ignora cliques nos handles de editar (✕, ⚙ e canto de resize)
      if (e.target.dataset && e.target.dataset.handle) return;
      if (editing) {
        startDrag(e, el, z, W, H);
      } else {
        z.on = !z.on;
        el.classList.toggle('on', z.on);
        sendTuya(z);
      }
    });

    planContainer.appendChild(el);
  });
}

// ═══ DRAG (livre, permite sobreposição e tap-para-editar) ═══
function startDrag(e, el, zone, W, H) {
  e.preventDefault();
  const ox = e.clientX - el.offsetLeft;
  const oy = e.clientY - el.offsetTop;
  const sx = e.clientX, sy = e.clientY;
  let moved = false;
  try { el.setPointerCapture(e.pointerId); } catch(_) {}

  function move(ev) {
    if (!moved && Math.abs(ev.clientX - sx) + Math.abs(ev.clientY - sy) < 5) return;
    moved = true;
    // Sem clamp: usuário posiciona livremente (pode sair um pouco e sobrepor)
    const nx = ev.clientX - ox;
    const ny = ev.clientY - oy;
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
    zone.lp = (nx / W) * 100;
    zone.tp = (ny / H) * 100;
    const zl = el.querySelector('.zone-light');
    if (zl) { zl.style.backgroundPosition = (-nx) + 'px ' + (-ny) + 'px'; }
  }
  function stop(ev) {
    el.removeEventListener('pointermove', move);
    el.removeEventListener('pointerup', stop);
    el.removeEventListener('pointercancel', stop);
    try { el.releasePointerCapture(e.pointerId); } catch(_) {}
    // Tap curto em modo edição abre o modal
    if (!moved && editing) {
      setTimeout(() => openZoneModal(zone), 30);
    }
  }
  el.addEventListener('pointermove', move);
  el.addEventListener('pointerup', stop);
  el.addEventListener('pointercancel', stop);
}

// ═══════════════ RESIZE ═══════════════
function startResize(e, el, zone, W, H) {
  e.preventDefault();
  const handle = e.target;
  const sw=el.offsetWidth, sh=el.offsetHeight, sx=e.clientX, sy=e.clientY;
  try { handle.setPointerCapture(e.pointerId); } catch(_) {}
  function move(ev) {
    const nw = Math.max(40, sw + ev.clientX - sx);
    const nh = Math.max(30, sh + ev.clientY - sy);
    el.style.width  = nw + 'px';
    el.style.height = nh + 'px';
    zone.wp = (nw / W) * 100;
    zone.hp = (nh / H) * 100;
    // reescala a luz para acompanhar o novo tamanho da zona
    const zl = el.querySelector('.zone-light');
    if (zl) { zl.style.backgroundSize = W + 'px ' + H + 'px'; }
  }
  function stop() {
    handle.removeEventListener('pointermove', move);
    handle.removeEventListener('pointerup', stop);
    handle.removeEventListener('pointercancel', stop);
    try { handle.releasePointerCapture(e.pointerId); } catch(_) {}
  }
  handle.addEventListener('pointermove', move);
  handle.addEventListener('pointerup', stop);
  handle.addEventListener('pointercancel', stop);
}

// ═══════════════ DELETE ═══════════════
function deleteZone(id) {
  if (!confirm('Remover esta zona?')) return;
  zones = zones.filter(z => z.id !== id);
  renderZones();
}

// ═══════════════ ADD ZONE ═══════════════
function addZone() {
  zones.push({
    id: 'z'+Date.now(),
    name: 'Nova Zona',
    lp: 40, tp: 40, wp: 15, hp: 15,
    on: false, tuya: []
  });
  renderZones();
}

// ═══════════════ EDIT MODE ═══════════════
function toggleEdit() {
  editing = !editing;
  document.body.classList.toggle('editing', editing);
  const btn = document.getElementById('editBtn');
  btn.textContent = editing ? '✔ CONCLUIR' : '✏ EDITAR';
  btn.classList.toggle('edit-active', editing);
  renderZones();
}

// ═══════════════ LABELS TOGGLE ═══════════════
function toggleLabels() {
  labelsOn = !labelsOn;
  document.body.classList.toggle('labels-on', labelsOn);
  const btn = document.getElementById('lblBtn');
  btn.style.borderColor = labelsOn ? 'var(--gold)' : '';
  btn.style.color = labelsOn ? 'var(--gold)' : '';
}

// ═══════════════ FULLSCREEN ═══════════════
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

// ═══════════════ ALL ON/OFF ═══════════════
function ligarTudo() {
  zones.forEach(z => { z.on = true; sendTuya(z); });
  renderZones();
}
function apagarTudo() {
  zones.forEach(z => { z.on = false; sendTuya(z); });
  renderZones();
}

// ═══════════════ TUYA ═══════════════
async function sendTuya(zone) {
  if (!tuyaCfg.worker || !tuyaCfg.clientId) {
    showDebug('⚠ Tuya não configurado (worker/clientId vazio)');
    return;
  }
  if (!zone.tuya || zone.tuya.length===0) {
    showDebug('⚠ "'+zone.name+'" não tem Device ID configurado');
    return;
  }
  for (const dev of zone.tuya) {
    if (!dev.deviceId) continue;
    try {
      const r = await fetch(tuyaCfg.worker+'/command', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          clientId: tuyaCfg.clientId,
          clientSecret: tuyaCfg.secret,
          deviceId: dev.deviceId,
          dp: dev.dp || 'switch_1',
          value: zone.on
        })
      });
      const j = await r.json();
      if (j.success === false || j.error) {
        showDebug('✘ Tuya respondeu erro: '+(j.msg||j.error||JSON.stringify(j)));
      } else {
        showDebug('✔ Comando enviado p/ '+dev.deviceId.substring(0,10)+'...');
      }
    } catch(e) {
      showDebug('✘ Falha de rede: '+e.message);
    }
  }
}

// Mostra um aviso temporário no rodapé da tela (debug visual sem precisar do F12)
function showDebug(msg) {
  let el = document.getElementById('debug-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'debug-toast';
    el.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#0e1220;border:1px solid #29b6f6;color:#29b6f6;font-family:monospace;font-size:11px;padding:8px 16px;border-radius:8px;z-index:9999;max-width:90%;text-align:center;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity='0'; }, 4000);
}

async function testTuya() {
  const dot = document.getElementById('sdot');
  const txt = document.getElementById('stext');
  dot.className='sdot'; txt.textContent='Testando...';
  const w = document.getElementById('t-worker').value.trim();
  if (!w) { txt.textContent='URL vazia'; return; }
  try {
    const r = await fetch(w+'/ping', {signal:AbortSignal.timeout(5000)});
    const j = await r.json();
    if (j.ok) {
      dot.className='sdot ok'; txt.textContent='Conectado ✓';
      // CORREÇÃO: salva automaticamente assim que o teste passa, não depende de clicar "Salvar" depois
      tuyaCfg.worker   = w;
      tuyaCfg.clientId = document.getElementById('t-cid').value.trim();
      tuyaCfg.secret   = document.getElementById('t-secret').value.trim();
      localStorage.setItem('sh_tuya', JSON.stringify(tuyaCfg));
      updateTuyaIndicator();
    }
    else throw 0;
  } catch(e) { dot.className='sdot err'; txt.textContent='Sem resposta'; }
}

function openTuya() {
  document.getElementById('t-worker').value = tuyaCfg.worker||'';
  document.getElementById('t-cid').value    = tuyaCfg.clientId||'';
  document.getElementById('t-secret').value = tuyaCfg.secret||'';
  document.getElementById('tuyaBackdrop').classList.add('open');
}
function closeTuya() { document.getElementById('tuyaBackdrop').classList.remove('open'); }
function saveTuya() {
  tuyaCfg.worker   = document.getElementById('t-worker').value.trim();
  tuyaCfg.clientId = document.getElementById('t-cid').value.trim();
  tuyaCfg.secret   = document.getElementById('t-secret').value.trim();
  localStorage.setItem('sh_tuya', JSON.stringify(tuyaCfg));
  updateTuyaIndicator();
  showDebug('✔ Config Tuya salva: '+(tuyaCfg.clientId?tuyaCfg.clientId.substring(0,8)+'...':'(vazio!)'));
  closeTuya();
}

// ═══════════════ ZONE MODAL ═══════════════
function openZoneModal(zone) {
  _editingZone = zone;
  document.getElementById('zm-title').textContent = '✏ ' + zone.name;
  document.getElementById('zm-name').value = zone.name;
  const cont = document.getElementById('zm-devices');
  cont.innerHTML = '';
  (zone.tuya||[]).forEach(d => addDevRowWith(d.deviceId, d.dp||'switch_1'));
  document.getElementById('zoneBackdrop').classList.add('open');
}
function closeZoneModal() { document.getElementById('zoneBackdrop').classList.remove('open'); _editingZone=null; }
function addDevRow() { addDevRowWith('','switch_1'); }
function addDevRowWith(id, dp) {
  const cont = document.getElementById('zm-devices');
  const row = document.createElement('div');
  row.className = 'device-row';
  row.innerHTML = `<input placeholder="Device ID" value="${id}" style="flex:3">
    <input placeholder="switch_1" value="${dp}" style="flex:2">
    <button class="drem" onclick="this.parentElement.remove()">✕</button>`;
  cont.appendChild(row);
}
function saveZoneModal() {
  if (!_editingZone) return;
  _editingZone.name = document.getElementById('zm-name').value.trim() || _editingZone.name;
  _editingZone.tuya = [];
  document.querySelectorAll('#zm-devices .device-row').forEach(row => {
    const ins = row.querySelectorAll('input');
    const id = ins[0].value.trim();
    if (id) _editingZone.tuya.push({deviceId:id, dp:ins[1].value.trim()||'switch_1'});
  });
  closeZoneModal();
  renderZones();
  // CORREÇÃO: persiste imediatamente no localStorage, sem depender do botão "Salvar" geral
  localStorage.setItem('sh_zones', JSON.stringify(zones));
}

// ═══════════════ SAVE / LOAD ═══════════════
function saveAll() {
  localStorage.setItem('sh_zones', JSON.stringify(zones));
  localStorage.setItem('sh_tuya',  JSON.stringify(tuyaCfg));
  const btn = document.querySelector('.ebtn.save');
  btn.textContent='✅ Salvo!';
  setTimeout(()=>btn.textContent='💾 Salvar', 1500);
}

function loadAll() {
  try {
    const z = localStorage.getItem('sh_zones');
    const t = localStorage.getItem('sh_tuya');
    if (z) zones = JSON.parse(z);
    if (t) tuyaCfg = JSON.parse(t);
  } catch(e) {}
  updateTuyaIndicator();
}

// Indicador visual no botão do cabeçalho: mostra se a config Tuya está realmente salva
function updateTuyaIndicator() {
  const btn = document.querySelector('.hbtn.green');
  if (!btn) return;
  if (tuyaCfg.worker && tuyaCfg.clientId && tuyaCfg.secret) {
    btn.textContent = '✔ TUYA OK';
    btn.style.borderColor = '#26d98b';
    btn.style.color = '#26d98b';
  } else {
    btn.textContent = '⚠ TUYA';
    btn.style.borderColor = '#ff4d6d';
    btn.style.color = '#ff4d6d';
  }
}

// ═══════════════ CLOCK ═══════════════
function startClock() {
  function tick() {
    const d = new Date();
    document.getElementById('clock').textContent =
      String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  tick(); setInterval(tick,1000);
}

// ═══════════════ WEATHER ═══════════════
async function fetchWeather() {
  try {
    const r = await fetch('https://wttr.in/Imbituva,Parana,Brazil?format=j1');
    const j = await r.json();
    const c = j.current_condition[0];
    const code = parseInt(c.weatherCode);
    let icon = '⛅';
    if (code===113) icon='☀️';
    else if (code===116) icon='🌤';
    else if ([119,122].includes(code)) icon='☁️';
    else if ([143,248,260].includes(code)) icon='🌫';
    else if ([176,263,266,293,296,353,356,359].includes(code)) icon='🌧';
    else if ([200,386,389].includes(code)) icon='⛈';
    else if ([179,182,323,326,329,332,335,338].includes(code)) icon='🌨';
    document.getElementById('wtemp').textContent = icon+' '+c.temp_C+'°C';
    document.getElementById('wcond').textContent = c.weatherDesc[0].value;
  } catch(e) {
    document.getElementById('wtemp').textContent = '---';
  }
}

// ═══════════════ INIT ═══════════════
loadAll();
startClock();
fetchWeather();
setInterval(fetchWeather, 15*60*1000);
resizePlan();
window.addEventListener('resize', resizePlan);
</script>
